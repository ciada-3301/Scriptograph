<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}YouTube Script Manager{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: #f8f9fa;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
        }

        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 15px;
        }

        .new-script-btn {
            width: 100%;
            padding: 10px 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .new-script-btn:hover {
            background: #1d4ed8;
        }

        .scripts-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .script-item {
            padding: 12px 16px;
            margin-bottom: 4px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
            text-decoration: none;
            display: block;
            color: inherit;
        }

        .script-item:hover {
            background: #f3f4f6;
        }

        .script-item.active {
            background: #eff6ff;
            border-left: 3px solid #2563eb;
        }

        .script-item-title {
            font-size: 14px;
            font-weight: 500;
            color: #1f2937;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .script-item-date {
            font-size: 12px;
            color: #6b7280;
        }

        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: #6b7280;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        /* Main content */
        .main-content {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Scrollbar styling */
        .scripts-list::-webkit-scrollbar {
            width: 6px;
        }

        .scripts-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .scripts-list::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }

        .scripts-list::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }
        }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body>
    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>📹 Script Manager</h1>
                <a href="/new" class="new-script-btn">+ New Script</a>
            </div>
            <div class="scripts-list" id="scriptsList">
                <!-- Scripts will be loaded here -->
            </div>
        </div>
        <div class="main-content">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script>
        // Load scripts into sidebar
        async function loadScripts() {
            try {
                const response = await fetch('/api/scripts');
                const scripts = await response.json();
                const scriptsList = document.getElementById('scriptsList');
                
                const scriptsArray = Object.values(scripts).sort((a, b) => 
                    new Date(b.updated_at) - new Date(a.updated_at)
                );

                if (scriptsArray.length === 0) {
                    scriptsList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📝</div>
                            <p>No scripts yet.<br>Create your first one!</p>
                        </div>
                    `;
                    return;
                }

                scriptsList.innerHTML = scriptsArray.map(script => {
                    const date = new Date(script.updated_at);
                    const formattedDate = date.toLocaleDateString('en-US', { 
                        month: 'short', 
                        day: 'numeric',
                        year: date.getFullYear() !== new Date().getFullYear() ? 'numeric' : undefined
                    });
                    
                    const currentScriptId = '{% block current_script_id %}{% endblock %}';
                    const isActive = script.id === currentScriptId ? 'active' : '';
                    
                    return `
                        <a href="/edit/${script.id}" class="script-item ${isActive}">
                            <div class="script-item-title">${escapeHtml(script.title)}</div>
                            <div class="script-item-date">${formattedDate}</div>
                        </a>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading scripts:', error);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load scripts on page load
        document.addEventListener('DOMContentLoaded', loadScripts);
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
